name: AI Fix Issue (Reusable)

on:
  workflow_call:
    secrets:
      DEEPSEEK_API_KEY:
        required: true

jobs:
  ai-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          repository: ao-org/argentum-online-assets
          path: _assets
          sparse-checkout: tools/ai_auto_pr_fix/scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI fix
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node _assets/tools/ai_auto_pr_fix/scripts/ai-fix.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-fix/issue-${{ github.event.issue.number }}
          commit-message: "fix: AI-generated fix for #${{ github.event.issue.number }}"
          title: "AI Fix: ${{ github.event.issue.title }}"
          body: |
            Automated fix for #${{ github.event.issue.number }}

            Generated by Claude based on the issue description and VB6 coding standards.

            > Review carefully before merging.
          labels: ai-generated
