name: AI Fix Build Errors (Reusable)

on:
  workflow_call:
    secrets:
      DEEPSEEK_API_KEY:
        required: true
      JENKINS_USER:
        required: true
      JENKINS_TOKEN:
        required: true

jobs:
  ai-retry:
    if: >
      github.event.state == 'failure' &&
      startsWith(github.event.branches[0].name, 'ai-fix/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check retry count
        id: retry-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.branches[0].name }}"
          # Count commits on this branch beyond main as a proxy for retries
          COMMIT_COUNT=$(git ls-remote --refs origin "$BRANCH" | wc -l)
          if [ "$COMMIT_COUNT" -gt 3 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Max retries (3) reached, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.retry-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.branches[0].name }}

      - name: Checkout scripts
        if: steps.retry-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ao-org/argentum-online-assets
          path: _assets
          sparse-checkout: tools/ai_auto_pr_fix/scripts

      - name: Setup Node.js
        if: steps.retry-check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI retry fix
        if: steps.retry-check.outputs.skip != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          TARGET_URL: ${{ github.event.target_url }}
        run: node _assets/tools/ai_auto_pr_fix/scripts/ai-fix-retry.mjs

      - name: Commit and push fix
        if: steps.retry-check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "fix: AI retry - fix build errors"
          git push
